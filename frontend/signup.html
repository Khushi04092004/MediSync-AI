<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — MediSync AI</title>
<link rel="stylesheet" href="static/style.css">
</head>
<body class="auth-body">
<div class="auth-split">
  <div class="auth-side-brand">
    <div class="bg-blobs" id="auth-blobs"></div>
    <div class="auth-side-content">
      <div class="brand auth-brand"><span class="dot"></span> MediSync AI</div>
      <h1 class="auth-side-title">Join MediSync AI</h1>
      <p class="auth-side-text">Scan prescriptions, get safe OTC suggestions, order medicine online — all verified before anything is dispensed.</p>
      <div class="ladder auth-side-ladder">
        <div class="ladder-step pass"><div class="node">1</div><div class="content"><strong>Scan Prescription</strong></div></div>
        <div class="ladder-step pass"><div class="node">2</div><div class="content"><strong>Self-Care Assistant</strong></div></div>
        <div class="ladder-step pass"><div class="node">3</div><div class="content"><strong>Order Online</strong></div></div>
      </div>
    </div>
  </div>

  <div class="auth-side-form">
    <button class="theme-toggle-btn auth-theme-btn" id="theme-toggle" type="button" title="Toggle theme">🌙</button>
    <div class="auth-card-plain">
      <h2 data-i18n="signup_title"></h2>
      <p class="subtitle" data-i18n="signup_subtitle" style="margin-bottom:24px;"></p>

      <div class="field">
        <label data-i18n="name_label"></label>
        <input type="text" id="name-input" placeholder="Your name" autocomplete="name">
      </div>
      <div class="field">
        <label data-i18n="email_label"></label>
        <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label data-i18n="password_label"></label>
        <input type="password" id="password-input" placeholder="At least 6 characters" autocomplete="new-password">
      </div>
      <div class="field">
        <label data-i18n="admin_code_label"></label>
        <input type="text" id="admin-code-input" data-i18n-placeholder="admin_code_placeholder">
      </div>
      <div id="error-box" class="warn-box hidden mt-24" style="margin-bottom:0;"></div>
      <button id="signup-btn" style="width:100%; margin-top:18px;" data-i18n="signup_btn"></button>
      <div id="signup-loading" class="hidden mt-24 flex"><span class="spinner"></span> <span data-i18n="signing_up"></span></div>

      <p class="auth-switch-line">
        <span data-i18n="have_account_text"></span>
        <a href="login.html" data-i18n="login_link"></a>
      </p>
    </div>
  </div>
</div>

<script src="static/i18n.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("medisync_token")) {
    window.location.href = "index.html";
    return;
  }
  applyTranslations();
  const theme = localStorage.getItem("medisync_theme") || "light";
  document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("theme-toggle").textContent = theme === "dark" ? "☀️" : "🌙";
  document.getElementById("theme-toggle").addEventListener("click", () => {
    const newTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    localStorage.setItem("medisync_theme", newTheme);
    document.documentElement.setAttribute("data-theme", newTheme);
    document.getElementById("theme-toggle").textContent = newTheme === "dark" ? "☀️" : "🌙";
  });
  document.getElementById("auth-blobs").innerHTML = `<div class="blob blob-a"></div><div class="blob blob-b"></div><div class="blob blob-c"></div>`;
});

function showError(message) {
  const box = document.getElementById("error-box");
  box.textContent = message;
  box.classList.remove("hidden");
}

document.getElementById("signup-btn").addEventListener("click", async () => {
  const name = document.getElementById("name-input").value.trim();
  const email = document.getElementById("email-input").value.trim();
  const password = document.getElementById("password-input").value;
  document.getElementById("error-box").classList.add("hidden");

  if (!name || !email || !password) { showError(t("fill_all_fields_error")); return; }
  if (password.length < 6) { showError(t("password_length_error")); return; }

  document.getElementById("signup-loading").classList.remove("hidden");
  document.getElementById("signup-btn").disabled = true;
  try {
    const res = await fetch("/api/auth/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password, admin_code: document.getElementById("admin-code-input").value.trim() }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Signup failed");
    localStorage.setItem("medisync_token", data.token);
    localStorage.setItem("medisync_user", JSON.stringify(data.user));
    window.location.href = "index.html";
  } catch (err) {
    showError(err.message);
  } finally {
    document.getElementById("signup-loading").classList.add("hidden");
    document.getElementById("signup-btn").disabled = false;
  }
});

document.getElementById("password-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("signup-btn").click();
});
</script>
</body>
</html>
